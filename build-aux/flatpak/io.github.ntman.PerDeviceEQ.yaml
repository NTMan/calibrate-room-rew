# Flathub manifest for per-device-eq.
#
# Local build and install:
#   flatpak-builder --user --install --force-clean build-flatpak \
#       build-aux/flatpak/io.github.ntman.PerDeviceEQ.yaml
# CI builds this manifest on every push and attaches an installable
# bundle to the run (.github/workflows/flatpak.yml) -- the CI is the
# referee for everything pinned below.
#
# The app source below is `dir` so CI and local builds test the
# checked-out tree. For the Flathub submission, swap it for the
# commented tagged-archive stanza at the bottom (x-checker-data keeps
# the Flathub repo following `tools/bump_version.py` +
# `gh release create vX.Y.Z`).
#
# GNOME runtime 50 rides freedesktop 25.08, which ships Python
# 3.13 (fact from elements/include/python3.yml on the release
# branch: v3.13.14) -- the wheels below are cp313, pinned from PyPI
# with their published sha256 digests. If the runtime moves,
# regenerate the python3-deps module (flatpak-pip-generator) and
# re-verify the python version the same way.

app-id: io.github.ntman.PerDeviceEQ
runtime: org.gnome.Platform
runtime-version: '50'
sdk: org.gnome.Sdk
command: per-device-eq

finish-args:
  - --share=ipc
  - --socket=wayland
  - --socket=fallback-x11
  - --device=dri
  # The PipeWire native socket: the app drives pw-dump, pw-cli,
  # pw-metadata and pw-cat against the HOST's PipeWire.
  - --filesystem=xdg-run/pipewire-0
  # The WirePlumber hook. install_full writes the script and the
  # conf.d fragment per-user through these binds; both installed
  # files carry their provenance and the removal command in a
  # header. WirePlumber restart stays a one-line user action by
  # design -- no host-command permission.
  - --filesystem=~/.local/share/wireplumber:create
  - --filesystem=xdg-config/wireplumber:create
  # One profile store for every incarnation of the app: RPM,
  # flatpak and a bare checkout share ~/.config/per-device-eq
  # (field verdict: the Bitwig way).
  - --filesystem=xdg-config/per-device-eq:create

modules:
  - name: pipewire-tools
    # The GNOME runtime carries libpipewire but none of the CLI
    # tools the app shells out to; build only the tools from the
    # matching upstream source, everything optional disabled.
    buildsystem: meson
    config-opts:
      - -Dsession-managers=[]
      - -Dalsa=disabled
      - -Dpipewire-alsa=disabled
      - -Djack=disabled
      - -Dpipewire-jack=disabled
      - -Dbluez5=disabled
      - -Dgstreamer=disabled
      - -Dgstreamer-device-provider=disabled
      - -Dsystemd-user-service=disabled
      - -Dselinux=disabled
      - -Dlibcamera=disabled
      - -Dx11=disabled
      - -Dvulkan=disabled
      - -Dtests=disabled
      - -Dexamples=disabled
      - -Dman=disabled
      - -Ddocs=disabled
    sources:
      - type: archive
        url: https://gitlab.freedesktop.org/pipewire/pipewire/-/archive/1.6.8/pipewire-1.6.8.tar.gz
        sha256: 8181172a1d95131f6af8bbc0b98f90b2a33349b042b84c3ce57dd5d11348cc58

  - name: python3-deps
    # numpy + scipy + soundfile (and soundfile's cffi/pycparser),
    # pinned cp312 manylinux wheels for both Flathub arches.
    buildsystem: simple
    build-commands:
      - pip3 install --verbose --exists-action=i --no-index
        --find-links="file://${PWD}" --prefix=${FLATPAK_DEST}
        --no-build-isolation numpy scipy soundfile
    sources:
