# On a published release, build the AppImage and attach it to
# the release page beside the RPMs and flatpak bundles -- the
# single-file door for everyone else. workflow_dispatch builds
# the same artifact from the current tree and parks it as a
# run artifact for field testing without a release.
#
# The job runs INSIDE the OLDEST SUPPORTED Fedora -- the base
# policy: Fedora EOLs ~13 months per release, so the number
# here is bumped once per cycle (together with build.sh and
# build-appdir.sh), never pinned for good; oldest-supported
# rather than latest because the base IS the glibc floor and
# latest would shut out hosts on the previous release. Today:
# fedora:43, floor glibc 2.42 (Fedora 43+, Ubuntu 25.10+).
# The harvest is a plain dnf --installroot; appimagetool runs
# without FUSE via APPIMAGE_EXTRACT_AND_RUN.
name: AppImage

on:
  release:
    types: [published]
  workflow_dispatch:

concurrency:
  group: appimage-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  appimage:
    runs-on: ubuntu-24.04
    container:
      image: fedora:43
    env:
      APPIMAGE_EXTRACT_AND_RUN: "1"
    steps:
      - name: Tooling
        run: |
          dnf -y install git glib2 gdk-pixbuf2 file binutils \
            wget zsync gh

      - uses: actions/checkout@v4

      - name: Version
        id: ver
        run: |
          git config --global --add safe.directory "$PWD"
          TAG="${{ github.event.release.tag_name }}"
          if [ -z "$TAG" ]; then
            TAG="$(git describe --tags --always)"
          fi
          echo "APP_VERSION=${TAG#v}" >> "$GITHUB_ENV"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Build
        working-directory: packaging/appimage
        run: |
          ./build-appdir.sh
          wget -q -O appimagetool \
            https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x appimagetool
          ARCH=x86_64 ./appimagetool \
            -u "gh-releases-zsync|NTMan|PerDeviceEQ|latest|PerDeviceEQ-*x86_64.AppImage.zsync" \
            AppDir \
            "PerDeviceEQ-${APP_VERSION}-x86_64.AppImage"
          ls -l PerDeviceEQ-*

      - name: Smoke (headless CLI through the bundled runtime)
        working-directory: packaging/appimage
        run: |
          ./PerDeviceEQ-*.AppImage --list-profiles

      - name: Smoke (the GUI opens a window)
        working-directory: packaging/appimage
        run: |
          dnf -y install xorg-x11-server-Xvfb dbus-daemon
          # alive at the timeout (124) = the window stood; a
          # segfault or import death exits first. cairo: the
          # container has no GPU worth waking.
          rc=0
          GSK_RENDERER=cairo timeout 10 xvfb-run -a \
            ./PerDeviceEQ-*.AppImage || rc=$?
          test "$rc" = 124

      - name: Attach to the release
        if: github.event_name == 'release'
        working-directory: packaging/appimage
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${{ steps.ver.outputs.tag }}" \
            ./*.AppImage ./*.AppImage.zsync --clobber \
            -R "${{ github.repository }}"

      - name: Park as a run artifact (dispatch builds)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: appimage
          path: packaging/appimage/*.AppImage*
