# Build the Flatpak on every push and PR; the manifest lives in
# build-aux/flatpak/. Each run attaches an installable bundle
# (per-device-eq-<arch>.flatpak) to the workflow -- download, then:
#   flatpak install --user ./per-device-eq-x86_64.flatpak
# The aarch64 leg runs on a native ARM runner (no emulation).
# On a published release the same bundles are attached to the
# release itself, so the Releases block carries installable
# builds for both arches.
name: Flatpak
on:
  release:
    types: [published]
  push:
    branches: [main]
    # docs, tests and repo tools never enter the bundle; the
    # referee sits those commits out
    paths-ignore:
      - "**.md"
      - "tests/**"
      - "tools/**"
  pull_request:
    paths-ignore:
      - "**.md"
      - "tests/**"
      - "tools/**"
  workflow_dispatch:

# the release-upload step needs write on contents
permissions:
  contents: write

# rapid pushes: the newest run supersedes the older one
concurrency:
  group: flatpak-${{ github.ref }}
  cancel-in-progress: true

jobs:
  flatpak:
    name: Flatpak (${{ matrix.variant.arch }})
    container:
      image: ghcr.io/flathub-infra/flatpak-github-actions:gnome-50
      options: --privileged
    strategy:
      fail-fast: false
      matrix:
        variant:
          - arch: x86_64
            runner: ubuntu-24.04
          - arch: aarch64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.variant.runner }}
    steps:
      - uses: actions/checkout@v5
      - uses: flatpak/flatpak-github-actions/flatpak-builder@v6
        with:
          bundle: per-device-eq-${{ matrix.variant.arch }}.flatpak
          manifest-path: build-aux/flatpak/io.github.ntman.PerDeviceEQ.yaml
          cache-key: flatpak-builder-${{ github.sha }}
          arch: ${{ matrix.variant.arch }}
      - name: Attach the bundle to the release
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ github.token }}
        run: >
          gh release upload
          "${{ github.event.release.tag_name }}"
          per-device-eq-${{ matrix.variant.arch }}.flatpak
          --clobber
