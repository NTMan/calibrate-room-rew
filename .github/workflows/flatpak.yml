# Build the Flatpak on every push and PR; the manifest lives in
# build-aux/flatpak/. Each run attaches an installable bundle
# (per-device-eq.flatpak) to the workflow -- download, then:
#   flatpak install --user ./per-device-eq.flatpak
# The aarch64 leg runs on a native ARM runner (no emulation).
name: Flatpak
on:
  push:
    branches: [main]
  pull_request:

jobs:
  flatpak:
    name: Flatpak (${{ matrix.variant.arch }})
    container:
      image: ghcr.io/flathub-infra/flatpak-github-actions:gnome-48
      options: --privileged
    strategy:
      fail-fast: false
      matrix:
        variant:
          - arch: x86_64
            runner: ubuntu-24.04
          - arch: aarch64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.variant.runner }}
    steps:
      - uses: actions/checkout@v5
      - uses: flatpak/flatpak-github-actions/flatpak-builder@v6
        with:
          bundle: per-device-eq.flatpak
          manifest-path: build-aux/flatpak/io.github.ntman.PerDeviceEQ.yaml
          cache-key: flatpak-builder-${{ github.sha }}
          arch: ${{ matrix.variant.arch }}
