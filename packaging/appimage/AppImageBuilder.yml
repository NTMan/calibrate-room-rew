# AppImage recipe (appimage-builder, apt-harvest flavor).
#
# The base is Ubuntu 25.04 (plucky): its archive hands us GTK
# 4.18 and libadwaita 1.7 as debs -- the app needs adw >= 1.6
# (AdwMultiLayoutView) -- so nothing is built from source. The
# price is the glibc floor of the base (2.41): the artifact
# runs on Ubuntu 25.04+/Fedora 42+ and kin. If the field ever
# asks for older LTS coverage, the named exit is a source-built
# GTK stack on an older base; this recipe stays the simple one.
#
# PipeWire is HOST territory by design: pw-dump/pw-cat/pw-cli
# talk to the host daemon and ship with every PipeWire distro;
# the app already speaks "PipeWire tools not found" when they
# are absent. Nothing PipeWire is bundled.
version: 1

script:
  # the launcher's own search order finds the package at
  # <prefix>/share/per-device-eq -- so the AppDir mirrors the
  # installed layout, and data/ rides checkout-shaped next to
  # the package, exactly how the app runs every day
  - rm -rf AppDir
  - mkdir -p AppDir/usr/share/per-device-eq
  - cp -r ../../perdeviceeq AppDir/usr/share/per-device-eq/
  - cp -r ../../data AppDir/usr/share/per-device-eq/
  - install -m 755 ../../per-device-eq.py
      AppDir/usr/share/per-device-eq/per-device-eq.py
  - mkdir -p AppDir/usr/share/applications
  - cp ../../data/io.github.ntman.PerDeviceEQ.desktop
      AppDir/usr/share/applications/
  - mkdir -p AppDir/usr/share/icons
  - cp -r ../../data/icons/hicolor AppDir/usr/share/icons/

AppDir:
  path: ./AppDir

  app_info:
    id: io.github.ntman.PerDeviceEQ
    # no space: the artifact file is named after this, and the
    # zsync chain embeds the filename -- renames after the
    # build would break updates. The desktop entry keeps the
    # human name from data/'s own .desktop file.
    name: PerDeviceEQ
    icon: io.github.ntman.PerDeviceEQ
    version: !ENV ${APP_VERSION}
    exec: usr/bin/python3
    exec_args: >-
      $APPDIR/usr/share/per-device-eq/per-device-eq.py $@

  apt:
    arch: amd64
    allow_unauthenticated: true
    sources:
      - sourceline: deb http://archive.ubuntu.com/ubuntu/
          plucky main universe
        key_url: >-
          http://keyserver.ubuntu.com/pks/lookup?op=get&search=0x871920D1991BC93C
      - sourceline: deb http://archive.ubuntu.com/ubuntu/
          plucky-updates main universe

    include:
      - python3
      - python3-gi
      - python3-gi-cairo
      - python3-numpy
      - python3-scipy
      - python3-soundfile
      - gir1.2-gtk-4.0
      - gir1.2-adw-1
      - gir1.2-glib-2.0
      - gir1.2-pango-1.0
      - gir1.2-gdkpixbuf-2.0
      - libadwaita-1-0
      - librsvg2-common
      - adwaita-icon-theme
      - shared-mime-info

    exclude:
      - dpkg
      - fdisk
      - util-linux

  files:
    exclude:
      - usr/share/man
      - usr/share/doc/*/README.*
      - usr/share/doc/*/changelog.*
      - usr/share/doc/*/NEWS.*
      - usr/share/doc/*/TODO.*

  runtime:
    env:
      PYTHONHOME: '${APPDIR}/usr'
      PYTHONPATH: >-
        ${APPDIR}/usr/lib/python3/dist-packages:${APPDIR}/usr/share/per-device-eq
      GI_TYPELIB_PATH: >-
        ${APPDIR}/usr/lib/x86_64-linux-gnu/girepository-1.0

AppImage:
  arch: x86_64
  # the auto-update channel a store would have provided: zsync
  # against the latest GitHub release
  update-information: >-
    gh-releases-zsync|NTMan|PerDeviceEQ|latest|*x86_64.AppImage.zsync
