# Packit: build RPMs in Fedora COPR automatically from GitHub releases.
# Setup once: install the "Packit" GitHub App on the repo, have a Fedora
# account (FAS) + a COPR project. Then every GitHub *release* triggers a COPR
# build for all active Fedora versions, hosted as a dnf repo users can enable.
specfile_path: per-device-eq.spec
upstream_package_name: per-device-eq
upstream_tag_template: "v{version}"

jobs:
  - job: copr_build
    trigger: release
    owner: mikhail            # <-- your COPR/FAS owner name
    project: per-device-eq
    targets:
      - fedora-all
